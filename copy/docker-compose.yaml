version: '3.8'

services:

  redis:
    image: redis:alpine
    container_name: my-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: my-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:

      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5


  fetcher:
    build: ./fetcher
    container_name: fetch1
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      redis:
        condition: service_healthy

  processor:
    build: ./processor
    container_name: proc1
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: front1
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  mongo_data: